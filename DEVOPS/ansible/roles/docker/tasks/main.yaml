- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
      - software-properties-common
    state: present
    update_cache: yes

- name: Add Google Cloud GPG key
  shell: |
    curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg

- name: Add Google Cloud repository
  copy:
    dest: /etc/apt/sources.list.d/google-cloud-sdk.list
    content: "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main"

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Google Artifact Registry credential helper
  apt:
    name: google-cloud-cli
    state: present
    update_cache: yes

- name: Configure Docker to use Artifact Registry authentication
  command: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: true